services:
  map-preview-app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./map-preview-app:/app
      - map_preview_node_modules:/app/node_modules
      - ./data/outputs:/app/public/data:ro
    restart: unless-stopped

volumes:
  map_preview_node_modules:
